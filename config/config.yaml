catalog:
  db_path: data/catalog.db
  meta_db_path: data/meta.db

# Embeddings are configured via environment variables:
#   UBS_EMBEDDINGS_PROVIDER=auto|openai|huggingface|local
#   OPENAI_API_KEY=...                       # only for openai
#   UBS_EMBEDDINGS_MODEL=text-embedding-3-small
#   UBS_EMBEDDINGS_BASE_URL=https://api.openai.com/v1
#   UBS_HF_EMBEDDINGS_MODEL=sentence-transformers/all-MiniLM-L6-v2
#   UBS_HF_EMBEDDINGS_BASE_URL=https://api-inference.huggingface.co
#   HF_API_TOKEN=...                         # optional for huggingface

# Optional: point to a YAML or JSON file with existing schema documentation.
# If omitted, inline `schema_docs` below will be used.
schema_docs_path: config/schema_docs.json

# ---------------------------------------------------------------------------
# Data sources
# ---------------------------------------------------------------------------
# The `connection` field accepts any SQLAlchemy database URL.
# Legacy SQLite entries that use a bare file path are auto-promoted to a
# sqlite:/// URL so existing configs keep working without modification.
#
# Common URL formats:
#   SQLite    : sqlite:///path/to/file.db
#   PostgreSQL: postgresql+psycopg2://user:password@host:5432/dbname
#   MySQL     : mysql+pymysql://user:password@host:3306/dbname
#   SQL Server: mssql+pyodbc://user:password@host/dbname?driver=ODBC+Driver+18+for+SQL+Server
#   Oracle    : oracle+oracledb://user:password@host:1521/?service_name=svcname
#   Snowflake : snowflake://user:password@account/database/schema
#   BigQuery  : bigquery://project/dataset
#   DuckDB    : duckdb:///path/to/file.duckdb
#   Delegated graph: use adapter `delegated_graph` with graph options
#
# Install the matching dialect driver before using a non-SQLite source:
#   pip install "ubs-hackathon[postgres]"   # psycopg2-binary
#   pip install "ubs-hackathon[mysql]"      # pymysql
#   pip install "ubs-hackathon[mssql]"      # pyodbc
#   pip install "ubs-hackathon[oracle]"     # oracledb
#   pip install "ubs-hackathon[snowflake]"  # snowflake-sqlalchemy
#   pip install "ubs-hackathon[bigquery]"   # sqlalchemy-bigquery
#   pip install "ubs-hackathon[duckdb]"     # duckdb-engine
# ---------------------------------------------------------------------------

data_sources:
  - name: big_demo_sqlite
    type: sqlite
    connection: data/big_demo.db
    description: Large synthetic SQLite dataset with hundreds of tables.
  # Uncomment and fill in to add a second source alongside the SQLite demo:
  # - name: prod_postgres
  #   type: postgresql
  #   connection: postgresql+psycopg2://user:password@localhost:5432/mydb
